<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Shanzay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1 class="greeting">Happy Birthday <span class="name">Shanzay</span></h1>
            
            <div class="countdown">
                <div class="countdown-item">
                    <span class="countdown-value" id="days">0</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="hours">0</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="minutes">0</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="seconds">0</span>
                    <span class="countdown-label">Seconds</span>
                </div>
            </div>

            <p class="message">Get ready for the best day ever! 🎉</p>

            <section class="gallery">
                <h2>Our Memories Together</h2>
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <div class="photo-placeholder">
                            <span>Photo 1</span>
                        </div>
                    </div>
                    <div class="gallery-item">
                        <div class="photo-placeholder">
                            <span>Photo 2</span>
                        </div>
                    </div>
                    <div class="gallery-item">
                        <div class="photo-placeholder">
                            <span>Photo 3</span>
                        </div>
                    </div>
                    <div class="gallery-item">
                        <div class="photo-placeholder">
                            <span>Photo 4</span>
                        </div>
                    </div>
                </div>
            </section>

            <p class="footer-message">Can't wait to celebrate with you! 🎂✨</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
